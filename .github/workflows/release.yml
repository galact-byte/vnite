name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Dependencies
        run: |
          npm config set msvs_version 2022
          npm ci

      - name: Build & Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build:win -- --publish never

      - name: Find Installer
        id: find-exe
        shell: bash
        run: |
          exe_path=$(ls dist/*-setup.exe 2>/dev/null | head -1)
          if [ -z "$exe_path" ]; then
            echo "ERROR: No setup exe found!"
            ls -la dist/
            exit 1
          fi
          echo "path=${exe_path}" >> $GITHUB_OUTPUT
          echo "name=$(basename "${exe_path}")" >> $GITHUB_OUTPUT

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-exe.outputs.path }}
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
